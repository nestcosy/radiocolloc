<!doctype html>
<html>
  <head>
    <meta charset="utf-8"/>
    <title>Radio</title>
    <link rel="stylesheet" href="/static/styles.css"/>
  </head>
  <body>
    <div id="topbar">
      <h1>Radio</h1>
      <div id="auth">
        {% if user %}
          <span>Bonjour {{ user.username }}</span>
          <form method="post" action="/logout" style="display:inline"><button type="submit">Se déconnecter</button></form>
        {% else %}
          <form id="loginForm" method="post" action="/login">
            <input name="username" placeholder="Pseudo"/>
            <button type="submit">Connexion</button>
          </form>
        {% endif %}
      </div>
    </div>

    <div id="controls">
      <button id="playBtn">Play aléatoire</button>

      <div id="tags">
        <h3>Tags</h3>
        <ul>
          {% for tag in tags %}
            <li><button class="tagBtn" data-tag="{{ tag }}">{{ tag }}</button></li>
          {% endfor %}
        </ul>
      </div>

      {% if user %}
      <div id="add">
        <h3>Ajouter</h3>
        <form id="addForm">
          <input name="url" id="url" placeholder="Lien Youtube ou playlist"/>
          <button type="submit">Ajouter</button>
        </form>
        <div id="addResult"></div>
      </div>
      {% endif %}
    </div>

    <div id="player">
      <audio id="audio" controls></audio>
      <div id="now"></div>
    </div>

    <script src="/static/main.js"></script>
  </body>
</html>
